<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background-color: #f1f1f1;
}

.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 20px;
  background: white;
  border-bottom: 1px solid #ddd;
}

.logo {
  font-weight: bold;
  font-size: 18px;
}

.upload-btn {
  background: #111;
  color: white;
  padding: 8px 18px;
  border-radius: 20px;
  border: none;
  cursor: pointer;
}

.advertise {
  color: #aaa;
  font-size: 12px;
  margin: 10px 20px;
}

.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 20px;
  padding: 20px;
}

.video-wrapper {
  text-align: center;
}

.video-title {
  margin-bottom: 8px;
  font-weight: bold;
}

.video-card {
  width: 100%;
  height: 500px;
  border-radius: 20px;
  overflow: hidden;
  background: black;
  box-shadow: 0 5px 20px rgba(0,0,0,0.2);
  position: relative;
  z-index: 1;
}

video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* IKLAN VIDEO */
.video-ad {
  position: absolute;
  bottom: 20px;
  left: 20px;
  right: 20px;
  background: rgba(0,0,0,0.8);
  color: white;
  padding: 15px;
  border-radius: 10px;
  display: none;
  z-index: 10;
  cursor: pointer;
}

.close-ad {
  position: absolute;
  top: 5px;
  right: 10px;
  cursor: pointer;
  font-weight: bold;
}

.download-btn {
  margin-top: 10px;
  background: #111;
  color: white;
  padding: 8px 16px;
  border-radius: 20px;
  border: none;
  cursor: pointer;
}

.download-btn:hover {
  background: #333;
}

/* Floating */
.floating-social {
  position: fixed;
  bottom: 20px;
  right: 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  z-index: 9999;
}

.floating-social img {
  width: 50px;
  height: 50px;
  border-radius: 50%;
}

/* POPUP 18+ */
.age-popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 99999;
}

.age-box {
  background: white;
  padding: 25px;
  border-radius: 15px;
  text-align: center;
  max-width: 300px;
}

.age-btn {
  margin: 10px;
  padding: 8px 16px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

.yes-btn { background: green; color: white; }
.no-btn { background: red; color: white; }

.ad-popup {
  position: fixed;
  bottom: 20px;
  left: 20px;
  width: 300px;
  background: white;
  border-radius: 12px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.3);
  overflow: hidden;
  z-index: 99999;
  display: none;
}
</style>

<body>

<script>
function fakeDownload() {

}

/* IKLAN VIDEO 10 DETIK */
const videoAdLink = "https://arkgleamfox.com/e60uraaz?key=00a8daf307455fd2003c7555c0a41b6f";

function openVideoAd() {
  window.open(videoAdLink, "_blank");
}

function closeVideoAd(e) {
  e.stopPropagation();
  document.querySelectorAll(".video-ad").forEach(ad => ad.style.display="none");
}

function startVideoAds() {
  setInterval(() => {
    document.querySelectorAll(".video-ad").forEach(ad => {
      ad.style.display = "block";
      setTimeout(() => ad.style.display="none", 5000);
    });
  }, 10000);
}

window.onload = startVideoAds;
</script>
